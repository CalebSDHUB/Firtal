name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. Backend – Test
  # ─────────────────────────────────────────
  test-backend:
    name: Test (backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: "test-key"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # 2. Frontend – Type-check & build
  # ─────────────────────────────────────────
  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: "https://placeholder.sliplane.app"
        run: npm run build

  # ─────────────────────────────────────────
  # 3. Build & push Docker images (main only)
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/firetal-agent-backend:latest
            ghcr.io/${{ env.OWNER }}/firetal-agent-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ghcr.io/${{ env.OWNER }}/firetal-agent-frontend:latest
            ghcr.io/${{ env.OWNER }}/firetal-agent-frontend:${{ github.sha }}

  # ─────────────────────────────────────────
  # 4. Deploy to Sliplane (main only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Sliplane
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy backend
        run: |
          curl -s -X POST "${{ secrets.SLIPLANE_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body

      - name: Deploy frontend
        run: |
          curl -s -X POST "${{ secrets.SLIPLANE_FRONTEND_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
