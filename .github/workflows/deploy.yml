name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. Test & Lint (runs on every push/PR)
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        env:
          # Stub values so the app can be imported during tests
          ANTHROPIC_API_KEY: "test-key"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # 2. Build Docker image (main branch only)
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/firetal-agent:latest
            ghcr.io/${{ github.repository_owner }}/firetal-agent:${{ github.sha }}

  # ─────────────────────────────────────────
  # 3. Trigger Sliplane redeploy (main branch only)
  #
  # Sliplane watches the GitHub repo directly and rebuilds on push.
  # The webhook step below is an optional explicit trigger if you
  # prefer push-based deploys via the Sliplane deploy webhook.
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Sliplane
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Sliplane deploy webhook
        run: |
          curl -s -X POST "${{ secrets.SLIPLANE_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
        # SLIPLANE_DEPLOY_WEBHOOK is set in GitHub → Settings → Secrets
